  <text x="250" y="158" font-family="system-ui,sans-serif" font-size="9" fill="#7c5cfc">IA: intencao alta</text>
  <rect x="240" y="176" width="140" height="50" rx="6" fill="#0d1328" stroke="#00e88f" stroke-width="1" stroke-opacity="0.3"/>
