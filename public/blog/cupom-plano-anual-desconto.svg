<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#070b18"/>
  <text x="400" y="45" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f0f0">Cupom + Plano Anual = Economia Maxima</text>
  <!-- Chart bars -->
  <text x="100" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#8b8fa3">Mensal</text>
  <text x="280" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#8b8fa3">Semestral</text>
  <text x="460" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#00e88f">Anual</text>
  <!-- Starter row -->
  <text x="640" y="155" text-anchor="start" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#f0f0f0">Starter</text>
  <rect x="40" y="120" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.3"/>
  <text x="100" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$197</text>
  <rect x="220" y="120" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.4"/>
  <text x="280" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$126</text>
  <rect x="400" y="120" width="120" height="50" rx="8" fill="#00e88f" fill-opacity="0.3" stroke="#00e88f" stroke-width="1"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#00e88f">R$83</text>
  <!-- Essential row -->
  <text x="640" y="225" text-anchor="start" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#f0f0f0">Essential</text>
  <rect x="40" y="190" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.3"/>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$360</text>
  <rect x="220" y="190" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.4"/>
  <text x="280" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$302</text>
  <rect x="400" y="190" width="120" height="50" rx="8" fill="#00e88f" fill-opacity="0.3" stroke="#00e88f" stroke-width="1"/>
  <text x="460" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#00e88f">R$244</text>
  <!-- Pro row -->
  <text x="640" y="295" text-anchor="start" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#f0f0f0">Pro</text>
  <rect x="40" y="260" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.3"/>
  <text x="100" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$707</text>
  <rect x="220" y="260" width="120" height="50" rx="8" fill="#7c5cfc" fill-opacity="0.4"/>
  <text x="280" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#7c5cfc">R$650</text>
  <rect x="400" y="260" width="120" height="50" rx="8" fill="#00e88f" fill-opacity="0.3" stroke="#00e88f" stroke-width="1"/>
  <text x="460" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#00e88f">R$592</text>
  <!-- Footer -->
  <text x="400" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#8b8fa3">Valores mensais com cupom PABLO100 aplicado</text>
</svg>
