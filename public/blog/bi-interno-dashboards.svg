<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="16" fill="#070b18"/>
  <text x="400" y="40" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#f0f0f0">BI Interno — Dashboards DataCrazy</text>
  <!-- Dashboard mockup -->
  <rect x="40" y="60" width="720" height="310" rx="12" fill="#0d1328" stroke="#1e2440" stroke-width="1"/>
  <!-- Metric cards -->
  <rect x="60" y="80" width="160" height="80" rx="8" fill="#1e2440"/>
  <text x="80" y="105" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">LTV</text>
  <text x="80" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#7c5cfc">R$2.450</text>
  <rect x="240" y="80" width="160" height="80" rx="8" fill="#1e2440"/>
  <text x="260" y="105" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">CAC</text>
  <text x="260" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#00e88f">R$89</text>
  <rect x="420" y="80" width="160" height="80" rx="8" fill="#1e2440"/>
  <text x="440" y="105" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">Conversao</text>
  <text x="440" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#7c5cfc">12.4%</text>
  <rect x="600" y="80" width="140" height="80" rx="8" fill="#1e2440"/>
  <text x="620" y="105" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">Receita/mes</text>
  <text x="620" y="135" font-family="system-ui,sans-serif" font-size="24" font-weight="800" fill="#00e88f">R$184k</text>
  <!-- Chart area -->
  <rect x="60" y="180" width="340" height="170" rx="8" fill="#1e2440"/>
  <text x="80" y="205" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">Conversao por origem</text>
  <!-- Bar chart -->
  <rect x="90" y="290" width="40" height="40" rx="4" fill="#7c5cfc"/>
  <text x="110" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8b8fa3">Google</text>
  <rect x="145" y="250" width="40" height="80" rx="4" fill="#00e88f"/>
  <text x="165" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8b8fa3">Insta</text>
  <rect x="200" y="230" width="40" height="100" rx="4" fill="#7c5cfc"/>
  <text x="220" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8b8fa3">WhatsApp</text>
  <rect x="255" y="270" width="40" height="60" rx="4" fill="#00e88f"/>
  <text x="275" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8b8fa3">Indicacao</text>
  <rect x="310" y="300" width="40" height="30" rx="4" fill="#7c5cfc" fill-opacity="0.5"/>
  <text x="330" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#8b8fa3">Outros</text>
  <!-- Funnel -->
  <rect x="420" y="180" width="320" height="170" rx="8" fill="#1e2440"/>
  <text x="440" y="205" font-family="system-ui,sans-serif" font-size="12" fill="#8b8fa3">Funil de vendas</text>
  <rect x="440" y="220" width="280" height="22" rx="4" fill="#7c5cfc" fill-opacity="0.6"/>
  <text x="580" y="236" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Leads: 1.240</text>
  <rect x="460" y="248" width="240" height="22" rx="4" fill="#7c5cfc" fill-opacity="0.5"/>
  <text x="580" y="264" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Qualificados: 680</text>
  <rect x="480" y="276" width="190" height="22" rx="4" fill="#00e88f" fill-opacity="0.5"/>
  <text x="575" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Proposta: 290</text>
  <rect x="500" y="304" width="140" height="22" rx="4" fill="#00e88f" fill-opacity="0.7"/>
  <text x="570" y="320" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Vendas: 154</text>
</svg>
